<main class="error-page" role="main" aria-labelledby="error-title">
  <section class="error-card" aria-describedby="error-message">
    <div class="icon"
         aria-hidden="true"
         [ngClass]="styles.icon">
      {{ errorCode }}
    </div>

    <h1 id="error-title">
      {{ title }}
    </h1>

    <p id="error-message" class="message">
      {{ message }}
    </p>

    <section class="actions" role="group" aria-label="Error page actions">
      <a routerLink="/home"
         class="primary-btn"
         [ngClass]="styles.primary"
         aria-label="Go to home page"
         pButton>
        Go Home
      </a>

      <p-button
        class="secondary-btn"
        (click)="goBack()"
        severity="secondary"
        label="Go back"
        aria-label="Go back to previous page">
      </p-button>
    </section>
  </section>
</main>
