<header class="header">
  @if (frontLayoutService.showLoggedLayout()) {
    <section class="menu-toggle-section">
      <button
        type="button"
        class="layout-menu-button"
        (click)="frontLayoutService.onMenuToggle()"
        aria-label="Open navigation menu"
        aria-haspopup="true"
        tabindex="0"
      >
        <i class="pi pi-bars" aria-hidden="true"></i>
      </button>
    </section>
  } @else {
    <div class="header-placeholder" aria-hidden="true"></div>
  }

  <section class="notif-logo-section">
    @if (frontLayoutService.showLoggedLayout()) {
      <app-notification></app-notification>
    }

    <section class="logo-section">
      <h1 class="school-name">{{ schoolName }}</h1>

      <a
        routerLink="/home"
        class="logo-link"
        aria-label="Go to homepage"
        tabindex="0"
      >
        <img
          ngSrc="assets/logo_512x512.png"
          alt="ENTropy logo"
          class="logo"
          ngmMotion
          [whileHover]="{ scale: 1.04, y: -2 }"
          [transition]="{
            type: 'spring',
            stiffness: 400,
            damping: 20
          }"
          height="512" width="512">
      </a>
    </section>
  </section>
</header>
