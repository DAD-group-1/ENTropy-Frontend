<header class="header">
  @if (showLoggedLayoutAndItems) {
    <section class="menu-toggle-section">
      <button class="layout-menu-button" (click)="layoutService.onMenuToggle()">
        <i class="pi pi-bars"></i>
      </button>
    </section>
  } @else {
    <div class="header-placeholder" aria-hidden="true"></div>
  }

  <section class="logo-section">
    <h1>{{ schoolName }}</h1>

    <a routerLink="/home" class="logo-link" aria-label="Go to homepage">
      <img src="assets/logo_512x512.png" alt="Logo ENTropy" class="logo"
           ngmMotion
           [whileHover]="{ scale: 1.04, y: -2 }"
           [transition]="{
          type: 'spring',
          stiffness: 400,
          damping: 20
        }">
    </a>
  </section>
</header>
