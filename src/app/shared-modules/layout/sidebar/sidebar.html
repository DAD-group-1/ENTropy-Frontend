<div class="sidebar-backdrop" (click)="layoutService.onMenuToggle()"
     [ngClass]="{ 'active': layoutService.layoutState().mobileMenuActive }"
     aria-hidden="true"></div>

<nav
  class="layout-sidebar"
  role="navigation"
  aria-label="Main sidebar"
  [ngClass]="{
    'mobile-active': layoutService.layoutState().mobileMenuActive,
    'desktop-inactive': layoutService.layoutState().staticMenuDesktopInactive && layoutService.isDesktop()
  }"
>
  <!-- Avatar and Student Name (Tailwind classes) -->
  <header>
    <section class="flex items-center gap-3 overflow-hidden cursor-pointer"
             (click)="navigationService.navigate('/profile')">
      <img src="assets/user-avatar.png" alt="Student Avatar"
           class="w-12 h-12 rounded-full object-cover border-2 border-white/6" />
      <section class="truncate">
        <p class="sidebar-student-name">{{ studentName || 'Student Name' }}</p>
        <p class="sidebar-entropy">{{ role }} · ENTropy</p>
      </section>
    </section>
    <button class="close-button" (click)="layoutService.onMenuToggle()">
      <i class="pi pi-times"></i>
    </button>
  </header>

  <ul class="layout-menu p-2 space-y-2" role="menu">
    <ng-container>
      @for (item of menuItems; track item) {
        <li class="sidebar-menu-item cursor-pointer" tabindex="0"
            role="button"
            routerLinkActive="active-link"
            (keydown.enter)="navigationService.navigate(item.route)"
            (keydown.space)="navigationService.navigate(item.route); $event.preventDefault()"
            (click)="navigationService.navigate(item.route)"
        >
          <div role="none" class="hidden pointer-events-none" [routerLink]="item.route || '/home'"
               aria-hidden="true"></div>

          <a
            role="menuitem"
            class="item-a"
          >
            <i [class]="item.icon + ' text-lg text-indigo-300'"></i>

            <span class="sidebar-item-text">{{ item.label }}</span>
          </a>
        </li>
      }
    </ng-container>
  </ul>

  <!-- Sticky Logout Button -->
  <footer class="sidebar-footer">
    <p-button (click)="onLogout()"
              severity="danger"
              aria-label="Log out"
              class="logout-button">
      <span>Logout</span>
      <i class="pi pi-sign-out"></i>
    </p-button>
  </footer>
</nav>
