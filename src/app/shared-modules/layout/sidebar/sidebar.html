<div class="sidebar-backdrop" (click)="layoutService.onMenuToggle()"
     [ngClass]="{ 'active': layoutService.layoutState().mobileMenuActive }"
     aria-hidden="{{ !layoutService.layoutState().mobileMenuActive }}"></div>

<nav
  class="layout-sidebar"
  role="navigation"
  aria-label="Main sidebar"
  [ngClass]="{
    'mobile-active': layoutService.layoutState().mobileMenuActive,
    'desktop-inactive': layoutService.layoutState().staticMenuDesktopInactive && layoutService.isDesktop()
  }"
>
  <!-- Avatar and Student Name (Tailwind classes) -->
  <header class="flex items-center justify-between px-4 py-3 border-b border-white/6">
    <div class="flex items-center gap-3 overflow-hidden">
      <img src="assets/user-avatar.png" alt="Student Avatar"
           class="w-12 h-12 rounded-full object-cover border-2 border-white/6" />
      <div class="truncate">
        <p class="sidebar-student-name">{{ studentName || 'Student Name' }}</p>
        <p class="sidebar-entropy">{{ role }} · ENTropy</p>
      </div>
    </div>
  </header>

  <ul class="layout-menu p-2 space-y-1" role="menu">
    <ng-container>
      @for (item of menuItems; track item) {
        <li class="sidebar-menu-item" role="none">
          <a
            href="#"
            role="menuitem"
            tabindex="0"
            class="item-a"
          >
            <i [class]="item.icon + ' text-lg text-indigo-300 group-hover:text-indigo-200'"></i>

            <span class="sidebar-item-text">{{ item.label }}</span>
          </a>
        </li>
      }
    </ng-container>
  </ul>

  <!-- Sticky Logout Button -->
  <footer class="sidebar-footer">
    <p-button (click)="onLogout()"
              severity="danger"
              aria-label="Log out"
              class="logout-button">
      <span>Logout</span>
      <i class="pi pi-sign-out"></i>
    </p-button>
  </footer>
</nav>
